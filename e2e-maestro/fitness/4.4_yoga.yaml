appId: com.danhvip2k4.mobileapp
---
# TC-4.4: Tập Yoga – chọn bài & hoàn thành session
- launchApp
- tapOn: "Activity"
- tapOn: "Yoga"
- assertVisible: ".*Yoga.*"
- tapOn:
    index: 0 # Chọn bài Yoga đầu tiên trong danh sách
- tapOn: "Start"
- tapOn: ".*NEXT.*|.*Skip.*|.*Tiếp.*"
- tapOn: ".*Finish.*|.*End.*|.*Hoàn thành.*"
- assertVisible: ".*Yoga.*Summary.*|.*Tổng kết.*"
