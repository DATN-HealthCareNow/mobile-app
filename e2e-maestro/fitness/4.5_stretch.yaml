appId: com.danhvip2k4.mobileapp
---
# TC-4.5: Tập Stretch – chọn bài & hoàn thành session
- launchApp
- tapOn: "Activity"
- tapOn: ".*Stretch.*"
- assertVisible: ".*Stretch.*"
- tapOn:
    index: 0 # Chọn bài đầu tiên
- tapOn: "Start"
- tapOn: ".*Finish.*|.*End.*|.*Hoàn thành.*"
- assertVisible: ".*Stretch.*Summary.*|.*Tổng kết.*"
