appId: com.danhvip2k4.mobileapp
---
# TC-2.2: Kiểm tra điều hướng giữa các Tab chính
- launchApp
# Nhấn tab Activity (Vị trí 2/5)
- tapOn:
    point: 30%,95%
- waitMs: 1000 # Đã sửa thành waitMs

# Nhấn tab Analysis (Vị trí 3/5)
- tapOn:
    point: 50%,95%
- waitMs: 1000

# Nhấn tab Chat (Vị trí 4/5 - Icon không có text)
- tapOn:
    point: 70%,95%
- waitMs: 1000
- assertVisible: ".*Coach.*|.*AI.*"

# Nhấn tab Profile (Vị trí 5/5)
- tapOn:
    point: 90%,95%
- waitMs: 1000

# Quay lại tab Home (Vị trí 1/5)
- tapOn:
    point: 10%,95%
